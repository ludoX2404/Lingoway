<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LingoWay</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
:root{--b1:#042C53;--b2:#0C447C;--b3:#185FA5;--b4:#378ADD;--b5:#85B7EB;--b6:#B5D4F4;--b7:#E6F1FB;--w:#fff;--br:#C8DFF5;--sf:#F0F7FF;--gn:#2D6A0A;--gb:#EAF3DE;--rd:#A32D2D;--rb:#FCEBEB;--or:#712B13;--ob:#FAECE7;--yw:#856404;--yb:#FFF3CD;}
html,body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--b7);min-height:100vh;}
.sc{display:none;min-height:100vh;flex-direction:column;}
.sc.on{display:flex;animation:fu .3s ease;}
@keyframes fu{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}

/* ── XP BAR ── */
.xp-wrap{background:var(--w);border:1px solid var(--br);border-radius:15px;padding:13px;margin-bottom:18px;}
.xp-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.xp-title{font-size:11px;font-weight:700;color:var(--b2);text-transform:uppercase;letter-spacing:.07em;}
.xp-val{font-size:13px;font-weight:800;color:var(--b3);}
.xp-bg{height:8px;background:var(--b7);border-radius:4px;overflow:hidden;}
.xp-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--b3),var(--b4));transition:width .8s cubic-bezier(.25,.8,.25,1);}
.xp-next{font-size:10px;color:var(--b5);margin-top:4px;display:flex;justify-content:space-between;}
/* ── MOT DU JOUR ── */
.motjour{background:var(--w);border:1.5px solid var(--b6);border-radius:18px;padding:16px 20px;display:flex;align-items:center;gap:16px;margin-bottom:18px;cursor:pointer;transition:border-color .15s;}
.motjour:hover{border-color:var(--b3);}
.mj-badge{background:var(--b3);color:#fff;border-radius:10px;padding:3px 10px;font-size:10px;font-weight:700;flex-shrink:0;}
.mj-word{font-size:18px;font-weight:800;color:var(--b1);margin-bottom:2px;letter-spacing:-.3px;}
.mj-def{font-size:12px;color:var(--b5);line-height:1.55;}
.mj-fr{font-size:11px;color:var(--b4);font-weight:700;margin-top:3px;}
.mj-arr{font-size:20px;color:var(--b5);flex-shrink:0;}
/* ── PROFILE MODAL ── */
.prof-modal-bd{display:none;position:fixed;inset:0;background:rgba(4,44,83,.5);z-index:400;align-items:center;justify-content:center;}
.prof-modal-bd.on{display:flex;}
.prof-modal{background:var(--w);border-radius:24px;padding:28px;width:420px;max-width:96vw;max-height:90vh;overflow-y:auto;}
.prof-av-big{width:72px;height:72px;border-radius:50%;background:var(--b3);display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;margin:0 auto 14px;}
.prof-name-big{font-size:18px;font-weight:800;color:var(--b1);text-align:center;margin-bottom:3px;}
.prof-email{font-size:12px;color:var(--b5);text-align:center;margin-bottom:20px;}
.prof-section{font-size:10px;font-weight:700;color:var(--b2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;padding-top:16px;border-top:1px solid var(--br);}
.prof-section:first-of-type{border-top:none;padding-top:0;}
.prof-stat-g{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:4px;}
.prof-stat{background:var(--b7);border-radius:12px;padding:11px;text-align:center;}
.prof-stat-v{font-size:18px;font-weight:800;color:var(--b1);}
.prof-stat-l{font-size:10px;color:var(--b5);}
.prof-field{margin-bottom:12px;}
.prof-field label{display:block;font-size:10px;font-weight:700;color:var(--b2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;}
.prof-field select,.prof-field input{width:100%;padding:10px 12px;border:1.5px solid var(--br);border-radius:10px;font-size:13px;font-family:inherit;color:var(--b1);background:var(--w);outline:none;}
.prof-field select:focus,.prof-field input:focus{border-color:var(--b3);}
.prof-saves{display:flex;gap:8px;margin-top:16px;}
/* ── STREAK CELEBRATION ── */
@keyframes streakPop{0%{transform:scale(0.5);opacity:0;}60%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}
.streak-pop{animation:streakPop .4s ease;}
/* ── HISTORY CARD ── */
.hist-card{background:var(--w);border:1px solid var(--br);border-radius:15px;padding:16px;margin-bottom:14px;}
.hist-title{font-size:10px;font-weight:700;color:var(--b2);text-transform:uppercase;letter-spacing:.07em;margin-bottom:11px;}
.hist-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:.5px solid var(--br);}
.hist-row:last-child{border:none;padding-bottom:0;}
.hist-date{font-size:11px;color:var(--b5);}
.hist-label{font-size:12px;font-weight:600;color:var(--b1);}
.hist-score{font-size:16px;font-weight:800;color:var(--b3);}


/* ══ CONVERSATION v2 ══ */
.conv-mode-sel{display:flex;gap:8px;margin-bottom:16px;}
.cms{flex:1;padding:11px;border:1.5px solid var(--br);border-radius:13px;background:var(--w);font-size:13px;font-weight:700;color:var(--b2);cursor:pointer;font-family:inherit;text-align:center;transition:all .14s;}
.cms:hover{border-color:var(--b4);background:var(--b7);}
.cms.on{background:var(--b3);border-color:var(--b3);color:#fff;}
.theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:14px;}
.theme-card{background:var(--sf);border:1.5px solid var(--br);border-radius:13px;padding:11px 13px;cursor:pointer;transition:all .13s;display:flex;align-items:flex-start;gap:10px;}
.theme-card:hover{border-color:var(--b4);background:var(--b7);}
.theme-card.on{border-color:var(--b3);background:var(--b7);}
.theme-ico{font-size:20px;flex-shrink:0;margin-top:1px;}
.theme-name{font-size:12px;font-weight:700;color:var(--b1);margin-bottom:2px;}
.theme-desc{font-size:11px;color:var(--b5);line-height:1.45;}
.conv-timer{display:flex;align-items:center;justify-content:space-between;background:var(--sf);border-radius:11px;padding:9px 14px;margin-bottom:11px;font-size:12px;font-weight:600;}
.conv-timer-left{color:var(--b5);}
.conv-timer-val{color:var(--b3);font-weight:800;font-size:14px;}
.conv-timer-val.warn{color:#e67e22;}
.conv-timer-val.end{color:var(--gn);}
.correction-banner{background:var(--b3);border-radius:16px;padding:18px 20px;margin-bottom:14px;color:#fff;}
.cb-title{font-size:14px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:7px;}
.cb-section{margin-bottom:12px;}
.cb-sec-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--b6);margin-bottom:6px;}
.cb-item{background:rgba(255,255,255,.12);border-radius:9px;padding:9px 12px;font-size:12px;line-height:1.65;color:#fff;margin-bottom:5px;}
.cb-item strong{color:#fff;}
.cb-item em{color:var(--b6);}
.cb-item .ok-tag{background:rgba(255,255,255,.2);border-radius:6px;padding:1px 7px;font-size:10px;font-weight:700;}
.api-setup{background:var(--b7);border:1.5px solid var(--b6);border-radius:16px;padding:18px 20px;margin-bottom:14px;}
.api-setup-title{font-size:14px;font-weight:800;color:var(--b1);margin-bottom:6px;}
.api-setup-sub{font-size:12px;color:var(--b5);line-height:1.65;margin-bottom:12px;}
.api-input-row{display:flex;gap:8px;}
.api-input-row input{flex:1;padding:10px 13px;border:1.5px solid var(--br);border-radius:10px;font-size:12px;font-family:inherit;color:var(--b1);background:var(--w);outline:none;}
.api-input-row input:focus{border-color:var(--b3);}
.mode-badge-ai{display:inline-block;background:var(--gb);color:var(--gn);border-radius:8px;padding:2px 9px;font-size:10px;font-weight:700;margin-left:6px;}
.mode-badge-demo{display:inline-block;background:var(--yb);color:var(--yw);border-radius:8px;padding:2px 9px;font-size:10px;font-weight:700;margin-left:6px;}

</style>
<style>/* ── TOPBAR ── */
.tb{background:var(--w);border-bottom:1px solid var(--br);padding:0 22px;height:58px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:sticky;top:0;z-index:100;}
.logo{font-size:21px;font-weight:800;color:var(--b1);letter-spacing:-.5px;cursor:pointer;}
.logo em{color:var(--b4);font-style:normal;}
.av{width:34px;height:34px;border-radius:50%;border:2.5px solid var(--b4);background:var(--b7);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--b3);cursor:pointer;}
/* ── STEP TRAIL ── */
.str{display:flex;align-items:center;gap:6px;}
.st{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--b5);}
.st.done{color:var(--gn);}
.st.cur{color:var(--b3);}
.stn{width:19px;height:19px;border-radius:50%;border:2px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:800;}
.st.done .stn{background:var(--gn);border-color:var(--gn);color:#fff;}
.st.cur .stn{background:var(--b3);border-color:var(--b3);color:#fff;}
.stsep{width:20px;height:2px;background:var(--br);border-radius:1px;}
.stsep.done{background:#97C459;}
/* ── HERO ── */
.hero{flex:1;display:flex;align-items:center;justify-content:center;padding:36px 20px;}
.hcard{background:var(--w);border-radius:24px;padding:40px 36px;max-width:520px;width:100%;border:1px solid var(--br);}
.hbadge{display:inline-flex;align-items:center;gap:5px;background:var(--b7);color:var(--b3);border-radius:20px;padding:5px 13px;font-size:11px;font-weight:700;margin-bottom:16px;}
.htitle{font-size:26px;font-weight:800;color:var(--b1);line-height:1.28;margin-bottom:9px;letter-spacing:-.4px;}
.hsub{font-size:13px;color:var(--b5);line-height:1.75;margin-bottom:24px;}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px;}
.fi{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--b2);font-weight:500;}
.fid{width:18px;height:18px;border-radius:5px;background:var(--b7);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.bcta{width:100%;padding:14px;background:var(--b3);color:#fff;border:none;border-radius:13px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;margin-bottom:9px;transition:opacity .15s;}
.bcta:hover{opacity:.88;}
.bgh{width:100%;padding:12px;background:transparent;color:var(--b3);border:1.5px solid var(--b5);border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;}
.trust{text-align:center;font-size:11px;color:var(--b5);margin-top:11px;}
/* ── FORMS ── */
.fw{flex:1;display:flex;align-items:center;justify-content:center;padding:28px 20px;}
.fc{background:var(--w);border-radius:22px;padding:34px;max-width:460px;width:100%;border:1px solid var(--br);}
.ftitle{font-size:20px;font-weight:800;color:var(--b1);margin-bottom:4px;}
.fsub{font-size:13px;color:var(--b5);margin-bottom:20px;line-height:1.6;}
.blk{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--b4);font-weight:700;cursor:pointer;border:none;background:none;font-family:inherit;margin-bottom:15px;padding:0;}
.fr2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.fd{margin-bottom:13px;}
.fd label{display:block;font-size:10px;font-weight:700;color:var(--b2);margin-bottom:4px;text-transform:uppercase;letter-spacing:.06em;}
.fd input,.fd select{width:100%;padding:10px 12px;border:1.5px solid var(--br);border-radius:10px;font-size:13px;font-family:inherit;color:var(--b1);background:var(--w);outline:none;transition:border-color .15s;}
.fd input:focus,.fd select:focus{border-color:var(--b3);}
.fd.err input,.fd.err select{border-color:var(--rd);}
.errmsg{font-size:10px;color:var(--rd);margin-top:2px;display:none;}
.fd.err .errmsg{display:block;}
.pw{position:relative;}
.pw input{padding-right:38px;}
.eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:14px;color:var(--b5);}
.bform{width:100%;padding:12px;background:var(--b3);color:#fff;border:none;border-radius:11px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:5px;}
.swla{text-align:center;font-size:12px;color:var(--b5);margin-top:12px;}
.swla a{color:var(--b3);font-weight:700;cursor:pointer;}
.legal{font-size:10px;color:var(--b5);text-align:center;margin-top:10px;line-height:1.6;}
.legal a{color:var(--b3);}
.ltip{background:var(--b7);border:1px solid var(--b6);border-radius:12px;padding:12px 15px;display:flex;gap:9px;margin-bottom:16px;}
.ltav{width:24px;height:24px;border-radius:50%;background:var(--b3);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.ltt{font-size:12px;color:var(--b1);line-height:1.6;}
.ltt strong{color:var(--b2);}
.forgot{display:block;text-align:right;font-size:11px;color:var(--b4);font-weight:600;cursor:pointer;margin-top:3px;}
.sep{display:flex;align-items:center;gap:10px;margin:12px 0;color:var(--b5);font-size:11px;}
.sep::before,.sep::after{content:'';flex:1;height:1px;background:var(--br);}
.bdemo{width:100%;padding:10px;background:var(--sf);border:1.5px solid var(--br);border-radius:10px;font-size:12px;font-weight:600;color:var(--b1);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:7px;}
/* ── TEST ── */
.ttb{background:var(--w);border-bottom:1px solid var(--br);padding:10px 22px;display:flex;align-items:center;gap:12px;flex-shrink:0;}
.spill{background:var(--b7);color:var(--b2);border-radius:10px;padding:3px 10px;font-size:10px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.prw{flex:1;}
.prm{display:flex;justify-content:space-between;font-size:10px;color:var(--b5);font-weight:600;margin-bottom:4px;}
.prbg{height:6px;background:var(--b7);border-radius:3px;overflow:hidden;}
.prfill{height:100%;background:var(--b3);border-radius:3px;transition:width .5s;}
.tmr{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:800;color:var(--b2);flex-shrink:0;}
.tbody{flex:1;display:flex;justify-content:center;padding:22px 20px 40px;}
.tcard{background:var(--w);border-radius:20px;padding:30px 32px;max-width:660px;width:100%;border:1px solid var(--br);}
.sbadge{display:inline-block;font-size:10px;font-weight:700;padding:3px 10px;border-radius:14px;margin-bottom:9px;}
.qtitle{font-size:18px;font-weight:700;color:var(--b1);line-height:1.38;margin-bottom:5px;}
.qsub{font-size:12px;color:var(--b5);line-height:1.65;margin-bottom:16px;}
.clist{display:flex;flex-direction:column;gap:7px;}
.ci{background:var(--sf);border:1.5px solid var(--br);border-radius:12px;padding:12px 14px;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:space-between;}
.ci:hover{border-color:var(--b4);background:var(--b7);}
.ci.sel{border-color:var(--b3);background:var(--b7);}
.ci.sel .cick{background:var(--b3);border-color:var(--b3);}
.ci.sel .cick::after{display:block;}
.cimain{font-size:13px;font-weight:600;color:var(--b1);}
.cisub{font-size:11px;color:var(--b5);margin-top:1px;}
.cick{width:18px;height:18px;border-radius:50%;border:2px solid var(--br);flex-shrink:0;position:relative;margin-left:9px;}
.cick::after{content:'';display:none;position:absolute;top:3px;left:3px;width:8px;height:8px;border-radius:50%;background:#fff;}
.chw{display:flex;flex-wrap:wrap;gap:6px;}
.ch{padding:7px 14px;border-radius:20px;border:1.5px solid var(--br);background:var(--w);font-size:12px;font-weight:600;color:var(--b2);cursor:pointer;transition:all .12s;}
.ch:hover{border-color:var(--b4);background:var(--b7);}
.ch.sel{background:var(--b3);border-color:var(--b3);color:#fff;}
.slbox{padding:6px 0 4px;}
.sllbls{display:flex;justify-content:space-between;font-size:10px;color:var(--b5);margin-bottom:6px;font-weight:600;}
input[type=range].rng{width:100%;-webkit-appearance:none;height:6px;border-radius:3px;background:var(--b6);outline:none;cursor:pointer;}
input[type=range].rng::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--b3);border:3px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.15);}
.slval{text-align:center;font-size:20px;font-weight:800;color:var(--b1);margin-top:10px;}
.slval span{font-size:12px;font-weight:500;color:var(--b5);}
.oa{width:100%;border:1.5px solid var(--br);border-radius:11px;padding:11px 14px;font-family:inherit;font-size:13px;color:var(--b1);resize:vertical;min-height:95px;outline:none;background:var(--w);line-height:1.65;}
.oa:focus{border-color:var(--b3);}
.chr{display:flex;justify-content:space-between;font-size:10px;color:var(--b5);margin-top:3px;}
.sgrid{display:flex;flex-direction:column;gap:14px;}
.srow{background:var(--sf);border-radius:12px;padding:13px 15px;}
.shdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.sname{font-size:13px;font-weight:700;color:var(--b1);}
.sdesc{font-size:10px;color:var(--b5);margin-top:1px;}
.sval{font-size:13px;font-weight:700;color:var(--b3);}
.lvlbls{display:flex;justify-content:space-between;font-size:9px;color:var(--b5);margin-top:4px;font-weight:600;}
.lq{font-size:14px;font-weight:600;color:var(--b1);line-height:1.65;margin-bottom:15px;}
.lopts{display:flex;flex-direction:column;gap:7px;margin-bottom:12px;}
.lopt{padding:10px 15px;border:1.5px solid var(--br);border-radius:10px;font-size:13px;font-weight:500;color:var(--b1);cursor:pointer;background:var(--w);text-align:left;font-family:inherit;transition:all .11s;}
.lopt:hover{border-color:var(--b4);background:var(--b7);}
.lopt.sel{border-color:var(--b3);background:var(--b7);}
.lopt.ok{border-color:var(--gn);background:var(--gb);color:var(--gn);}
.lopt.ko{border-color:var(--rd);background:var(--rb);color:var(--rd);}
.lfb{background:var(--b7);border-radius:10px;padding:10px 13px;font-size:12px;color:var(--b1);line-height:1.65;display:none;margin-bottom:9px;border:1px solid var(--b6);}
.lfb strong{color:var(--b2);}
.pbx{background:var(--sf);border-radius:11px;padding:15px;font-size:13px;line-height:1.8;color:var(--b1);max-height:155px;overflow-y:auto;margin-bottom:14px;border:1px solid var(--br);}
.wprompt{background:var(--b7);border-radius:11px;padding:12px 15px;font-size:12px;color:var(--b1);line-height:1.75;margin-bottom:12px;border-left:4px solid var(--b3);}
.tnav{display:flex;align-items:center;justify-content:space-between;margin-top:20px;padding-top:16px;border-top:1px solid var(--br);}
.bprev{padding:9px 16px;background:transparent;color:var(--b4);border:1.5px solid var(--b6);border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
.bprev:disabled{opacity:.3;cursor:default;}
.tdots{display:flex;gap:4px;align-items:center;}
.td{width:6px;height:6px;border-radius:50%;background:var(--br);transition:all .2s;}
.td.cur{background:var(--b3);width:16px;border-radius:3px;}
.td.done{background:var(--b5);}
.bnxt{padding:9px 24px;background:var(--b3);color:#fff;border:none;border-radius:9px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;}
/* ── RESULTS ── */
.rbody{flex:1;display:flex;justify-content:center;padding:28px 20px 44px;}
.rcard{background:var(--w);border-radius:22px;padding:38px;max-width:680px;width:100%;border:1px solid var(--br);}
.lvhero{text-align:center;margin-bottom:26px;}
.lvbig{font-size:52px;font-weight:800;color:var(--b1);letter-spacing:-2px;line-height:1;}
.lvpill{display:inline-block;background:var(--b3);color:#fff;border-radius:18px;padding:5px 17px;font-size:13px;font-weight:700;margin:7px 0 12px;}

/* ═══ LEVEL COMPUTATION ═══ */
function computeLevel(){
  var gs=U.gramScores||{},gk=Object.keys(gs),gp=gk.length?gk.reduce(function(a,k){return a+gs[k];},0)/gk.length:0.4;
  var vs=U.vocabSc||{},vk=Object.keys(vs),vp=vk.length?vk.reduce(function(a,k){return a+vs[k];},0)/vk.length:0.4;
  var rp=U.readScore!=null?U.readScore:0.5;
  var ww=(U.writingText||'').trim().split(/\s+/).filter(function(w){return w.length>0;}).length;
  var wp=Math.min(1,ww/55);
  var sa=((U.selfGrammar||3)+(U.selfSpeaking||3)+(U.selfListening||3)+(U.selfWriting||3))/20;
  var em={0:.1,1:.2,2:.35,3:.55,4:.75,5:.9};
  var c=gp*.30+vp*.20+rp*.10+wp*.10+sa*.15+(em[U.priorExp||2]||.35)*.15;
  U.score=Math.round(c*100);
  var lvls=['A1','A1','A2','A2','B1','B1','B2','B2','C1','C1','C2'];
  U.level=lvls[Math.min(Math.floor(c*10),10)];
  var lns={A1:'Débutant',A2:'Élémentaire',B1:'Intermédiaire',B2:'Intermédiaire supérieur',C1:'Avancé',C2:'Maîtrise'};
  U.levelName=lns[U.level]||'Intermédiaire';
  var cl=['TOEFL iBT','IELTS Academic','Cambridge B2','Cambridge C1','TOEIC','usage libre'],cs=['TOEFL','IELTS','B2','C1','TOEIC','Libre'];
  U.certName=cl[U.certGoal||5];U.certShort=cs[U.certGoal||5];
  var ml=['la carrière & le business','les études académiques','l\'expatriation','les voyages','les médias & la culture','la curiosité personnelle'];
  U.motivName=ml[U.motivation||0];
  var wkl=['la grammaire','les articles','les prépositions','la prononciation','la compréhension orale','le vocabulaire','les structures complexes','les expressions idiomatiques','la confiance à l\'oral','la rédaction'];
  U.weakNames=(U.weaknesses||[]).map(function(i){return wkl[i];}).slice(0,3);
  U.skillScores={Grammaire:Math.round(Math.min(100,(gp*.6+(U.selfGrammar||3)/5*.4)*100)),Vocabulaire:Math.round(Math.min(100,(vp*.5+(U.selfListening||3)/5*.5)*100)),Compréhension:Math.round((U.selfListening||3)/5*100),Expression:Math.round((U.selfSpeaking||3)/5*100),Lecture:Math.round(Math.min(100,(rp*.5+(U.selfGrammar||3)/5*.5)*100)),Écriture:Math.round(Math.min(100,wp*100))};
  U.streak=1;U.wordsLearned=0;U.weekPlan=buildWeekPlan();
  LS.s('profile',U);
}
function buildWeekPlan(){
  var wk=U.weakNames&&U.weakNames.length?U.weakNames.join(', '):'les fondamentaux';
  var tn=U.targetName||'anglais';
  return [

}

function switchMode(id,tab){
  document.querySelectorAll('.mt').forEach(function(t){t.classList.remove('on');});tab.classList.add('on');
  document.querySelectorAll('#s-app .asc').forEach(function(s){s.classList.remove('on');});
  $id('m-'+id).classList.add('on');
  if(curMod){$id('mod-'+curMod).classList.remove('on');curMod=null;}
  $id('app-home').style.display='block';
}
function openModule(key){
  curMod=key;$id('app-home').style.display='none';
  document.querySelectorAll('#m-learn .asc').forEach(function(s){s.classList.remove('on');});
  $id('mod-'+key).classList.add('on');
  if(key==='grammar')buildGrammar();
  else if(key==='vocab')buildVocab();
  else if(key==='reading')buildReading();
  else if(key==='conversation')initConv();
  else if(key==='coaching')buildCoaching();
  else if(key==='exam')buildExamHome();
  else if(key==='dashboard'){setTimeout(buildDash,150);}
}
function closeModule(){
  if(curMod){$id('mod-'+curMod).classList.remove('on');curMod=null;}
  $id('app-home').style.display='block';
}
function detPanel(title,sub,ico,body){

    +body+'</div>';
}

function renderRQ(art,step){
  var q=step===0?art.q:art.q2;
  var opts=step===0?art.opts:art.opts2;
  var ans=step===0?art.ans:art.ans2;
  var h='<div class="qbox" style="margin-top:12px;"><div style="font-size:11px;font-weight:700;color:var(--b5);margin-bottom:9px;">Question '+(step+1)+'/2</div>';
  h+='<div class="qq">'+q+'</div><div class="qopts">';
  opts.forEach(function(o,i){h+='<button class="qopt" onclick="pickR2('+step+','+i+','+ans+',this)">'+o+'</button>';});
  h+='</div><div class="qfb" id="rfb'+step+'"></div></div>';
  var rq=$id('rq');if(rq)rq.innerHTML+=h;
}
function pickR2(step,idx,ans,el){
  var key='r'+step;if(rAnswers[key]!==undefined)return;
  rAnswers[key]={chosen:idx,correct:idx===ans};
  document.querySelectorAll('.qopt').forEach(function(o){o.onclick=null;});
  el.classList.add(idx===ans?'ok':'ko');
  if(idx!==ans)document.querySelectorAll('.qopt')[ans].classList.add('ok');
  var fb=$id('rfb'+step);fb.style.display='block';
  fb.innerHTML=idx===ans?'<strong>✓ Correct !</strong> Bien repéré dans le texte.':'<strong>✗ Incorrect.</strong> Relisez attentivement.';
  if(step===0){
    var art=TEXTS[TODAY%TEXTS.length];
    setTimeout(function(){renderRQ(art,1);},1100);
  }else{
    setTimeout(function(){
      var correct=Object.values(rAnswers).filter(function(r){return r.correct;}).length;
      var rq=$id('rq');
      if(rq)rq.innerHTML+='<div class="scsc" style="padding:14px 0;"><div class="sccirc"><div class="scn">'+correct+'</div><div class="sct">/2</div></div><div class="sctitle">'+(correct===2?'Excellent !':'Continuez !')+'</div><button class="bts" onclick="closeModule();markDone(\'reading\')" style="margin-top:8px;">Retour</button></div>';
      markDone('reading');
    },1100);
  }
}

function renderConvChat() {

var CORRS = [
  {p:/\bi go\b/i, o:'I go', f:'I went', r:'Past simple for completed actions.'},
  {p:/\bhe don't\b/i, o:"he don't", f:"he doesn't", r:'3rd person singular needs "doesn\'t".'},
  {p:/\bi have went\b/i, o:'I have went', f:'I have gone', r:'Present perfect: use "gone" not "went".'},
  {p:/\bI am agree\b/i, o:'I am agree', f:'I agree', r:'"Agree" is a verb, not an adjective.'},
  {p:/\bdepend of\b/i, o:'depend of', f:'depend on', r:'"Depend" takes preposition "on".'},
  {p:/\bmore easier\b/i, o:'more easier', f:'easier', r:'"Easier" is already comparative.'},
  {p:/\bsince [0-9]+ years\b/i, o:'since X years', f:'for X years', r:'"For" with duration; "since" with a point in time.'},
  {p:/\bI has\b/i, o:'I has', f:'I have', r:'"Has" is for 3rd person singular only.'},
  {p:/\bcan to\b/i, o:'can to', f:'can', r:'Modal verbs are not followed by "to".'},
  {p:/\bvery much people\b/i, o:'very much people', f:'many people', r:'"People" is countable — use "many".'},
];

var userMessagesForCorrection = [];

function sendConvMsg() {
  var inp = $id('ci');
  var text = inp.value.trim();
  if (!text) return;
  inp.value = '';

  userMessagesForCorrection.push(text);
  convMsgs.push({ r: 'user', t: text });
  renderConvChat();

  var isAI = convMode === 'ai' && !!convApiKey;

  if (isAI) {
    convTyping = true;
    renderConvChat();
    callClaudeAPI(text);
  } else {
    // Text mode with local corrections
    var corr = null;
    for (var i = 0; i < CORRS.length; i++) {
      if (CORRS[i].p.test(text)) {
        var c = CORRS[i];
        corr = '<strong>"' + c.o + '" → "' + c.f + '"</strong> — ' + c.r;
        break;
      }
    }
    convTyping = true;
    renderConvChat();
    var topic = convTheme ? convTheme.key : 'free';
    var TREPLIES = {
      job_interview: ["Good answer! {c} Can you give me a specific example from your past experience?", "Interesting! {c} How would your previous manager describe your work style?", "That's great! {c} Where do you see yourself in 5 years?"],
      business_meeting: ["Thank you for the update. {c} What are the main blockers right now?", "I see. {c} Can you walk us through the timeline?", "Good point. {c} How does this align with Q4 objectives?"],
      travel: ["Excellent choice! {c} Have you visited this place before?", "Wonderful! {c} What was your favourite experience there?", "Great! {c} Did you try any local cuisine?"],
      debate: ["Interesting argument! {c} Can you give evidence to support that?", "I'd challenge that point — {c} What about the downsides?", "Good reasoning! {c} But have you considered the opposite view?"],
      media: ["Oh I love that! {c} What did you think of the ending?", "Interesting choice! {c} Would you recommend it to a friend?", "Great taste! {c} What genre do you usually prefer?"],
      free: ["That's interesting! {c} Can you tell me more?", "Good point! {c} Can you give a specific example?", "I see what you mean. {c} How do you feel about it overall?"]
    };
    var replies = TREPLIES[topic] || TREPLIES.free;
    var aiCount = convMsgs.filter(function(m) { return m.r === 'ai'; }).length;
    var resp = replies[aiCount % replies.length].replace('{c}', corr ? 'One small correction:' : 'Well said!');

    setTimeout(function() {
      convTyping = false;
      addAI(resp, corr);
      var userMsgs = convMsgs.filter(function(m) { return m.r === 'user'; }).length;
      if (userMsgs >= 8) markDone('conversation');
    }, 1100);
  }
}

/* ─── CLAUDE API CALL ─── */
function callClaudeAPI(userMessage) {
  var theme = convTheme || CONV_THEMES[11];
  var systemPrompt = theme.prompt + '\n\nUser level: ' + U.level + ' (' + U.levelName + ') in ' + U.targetName + '. Their weak points: ' + (U.weakNames || []).join(', ') + '. Keep responses short (2-3 sentences max). If you spot a grammar error, gently note it after your reply with "✏️ Note: [correction]".';

  // Build message history for context
  convHistory.push({ role: 'user', content: userMessage });

  var messages = convHistory.slice(-10); // last 10 messages for context

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': convApiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: 300,
      system: systemPrompt,
      messages: messages
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    convTyping = false;
    if (data.content && data.content[0]) {
      var reply = data.content[0].text;
      convHistory.push({ role: 'assistant', content: reply });
      addAI(reply);
      var userMsgs = convMsgs.filter(function(m) { return m.r === 'user'; }).length;
      if (userMsgs >= 8) markDone('conversation');
    } else {
      addAI('Sorry, I had trouble responding. Please try again.');
    }
  })
  .catch(function(err) {
    convTyping = false;
    addAI('⚠️ Erreur de connexion. Vérifiez votre clé API ou essayez le mode Texte.');
    renderConvChat();
  });
}

/* ─── AI CORRECTION AFTER 5 MIN ─── */
function requestAICorrection() {
  if (convCorrectionDone || !convApiKey) return;
  convCorrectionDone = true;

  var userTexts = userMessagesForCorrection.join('\n');
  if (!userTexts.trim()) return;

  var corrPrompt = 'The student has been practicing ' + U.targetName + ' (level ' + U.level + '). Here are all their messages:\n\n' + userTexts + '\n\nPlease give a structured correction report with:\n1. POINTS FORTS: 2-3 things they did well\n2. ERREURS RÉCURRENTES: grammar or vocabulary errors with corrections\n3. CONSEIL DU JOUR: one specific tip to improve\n\nKeep it encouraging and concise. Use emojis to make it friendly. Respond in French.';

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': convApiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-5',
      max_tokens: 500,
      messages: [{ role: 'user', content: corrPrompt }]
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    if (data.content && data.content[0]) {
      showCorrectionBanner(data.content[0].text, true);
    }
  })
  .catch(function() {});
}

/* ─── MANUAL CORRECTION (text mode) ─── */
function showManualCorrection() {
  var msgs = convMsgs.filter(function(m) { return m.r === 'user'; });
  if (msgs.length < 2) { toast('Écrivez au moins 2 messages avant le bilan !'); return; }

  var errors = [];
  var ok = [];
  msgs.forEach(function(m) {
    for (var i = 0; i < CORRS.length; i++) {
      if (CORRS[i].p.test(m.t)) {
        errors.push({ found: CORRS[i].o, correct: CORRS[i].f, reason: CORRS[i].r, sentence: m.t });
        break;
      }
    }
    // Check for good structures
    if (/\bhas been\b|\bhave been\b/i.test(m.t)) ok.push('"' + m.t.substring(0, 40) + '..." — present perfect utilisé correctement.');
    if (/\bwould\b|\bcould\b|\bshould\b/i.test(m.t)) ok.push('"' + m.t.substring(0, 40) + '..." — modal bien utilisé.');
  });

  var report = '## Bilan de votre conversation\n\n';
  if (ok.length > 0) report += '**✅ Points forts :**\n' + ok.slice(0, 2).map(function(o) { return '- ' + o; }).join('\n') + '\n\n';
  if (errors.length > 0) {
    report += '**✏️ Erreurs à corriger :**\n';
    errors.forEach(function(e) { report += '- "' + e.found + '" → "' + e.correct + '" — ' + e.reason + '\n'; });
  } else {
    report += '**✅ Aucune erreur majeure détectée — excellent travail !**\n';
  }
  report += '\n**💡 Conseil :** Continuez à pratiquer — la régularité est la clé du progrès !';
  showCorrectionBanner(report, false);
}

function showCorrectionBanner(text, isAI) {
  var lines = text.split('\n').filter(function(l) { return l.trim(); });
  var h = '<div class="correction-banner">';
  h += '<div class="cb-title">📋 ' + (isAI ? 'Bilan IA — 5 minutes de conversation' : 'Bilan de correction') + '</div>';
  lines.forEach(function(line) {
    line = line.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
    if (line.startsWith('## ') || line.startsWith('# ')) return;
    if (line.match(/^[✅✏️💡🎯📊]/)) {
      h += '<div class="cb-section"><div class="cb-sec-title">' + line + '</div></div>';
    } else if (line.startsWith('- ') || line.startsWith('• ')) {
      h += '<div class="cb-item">' + line.substring(2) + '</div>';
    } else {
      h += '<div style="font-size:12px;color:rgba(255,255,255,.85);line-height:1.65;margin-bottom:6px;">' + line + '</div>';
    }
  });
  h += '</div>';
  convMsgs.push({ r: 'correction', t: h });
  renderConvChat();
  markDone('conversation');
}

function pickExQ(idx,ans,el){if(examSt.ans[examSt.qi])return;examSt.ans[examSt.qi]={chosen:idx,correct:idx===ans};document.querySelectorAll('.qopt').forEach(function(o){o.onclick=null;});el.classList.add(idx===ans?'ok':'ko');if(idx!==ans)document.querySelectorAll('.qopt')[ans].classList.add('ok');var q=examSt.qs[examSt.qi];var fb=$id('efb');fb.style.display='block';fb.innerHTML=(idx===ans?'<strong>✓ Correct !</strong> ':'<strong>✗ Incorrect.</strong> ')+q.exp;}

function evalW(text){var wc=text.trim().split(/\s+/).filter(function(w){return w.length>0;}).length;var sc=0;if(wc>=70)sc+=30;else if(wc>=50)sc+=20;else sc+=8;var pw=['regret','inform','apologise','apologize','appreciate','committed','ensure','regards','sincerely','deadline','deliver','delay'];var found=pw.filter(function(w){return text.toLowerCase().indexOf(w)>-1;});sc+=found.length>=4?30:found.length>=2?18:5;if(/dear|hello/i.test(text))sc+=10;if(/regards|sincerely|thank you/i.test(text))sc+=10;sc=Math.min(100,sc+20);var lvl=sc>=75?'ok':sc>=50?'ko':'ko';return '<strong>Évaluation IA :</strong> '+(sc>=75?'Bonne maîtrise de l\'email pro':sc>=50?'Structure correcte, à améliorer':'À retravailler')+' <span style="display:inline-block;padding:1px 8px;border-radius:8px;font-size:10px;font-weight:700;background:'+(sc>=75?'var(--gb);color:var(--gn)':'var(--rb);color:var(--rd)')+'">'+sc+'/100</span><br><span style="font-size:11px;color:var(--b5);">'+wc+' mots · '+found.slice(0,3).join(', ')+(found.length>0?' (vocab pro)':'')+'</span>';}

/* ── XP SYSTEM ── */
var XP_REWARDS={grammar:60,vocab:50,reading:40,conversation:70,exam:120};
var XP_LEVELS=[0,200,500,900,1400,2100,3000,4200,5800,8000,11000];
function getXP(){return LS.g('xp_total')||0;}
function addXP(key){
  var pts=XP_REWARDS[key]||30;
  var total=getXP()+pts;
  LS.s('xp_total',total);
  var names={grammar:'Grammaire',vocab:'Vocabulaire',reading:'Compréhension',conversation:'Conversation',exam:'Examen'};
  toast('+'+ pts+' XP — '+(names[key]||key)+' terminé !');
  return total;
}
function getXPLevel(xp){for(var i=XP_LEVELS.length-1;i>=0;i--)if(xp>=XP_LEVELS[i])return i+1;return 1;}
function getXPProgress(xp){var lv=getXPLevel(xp)-1;var cur=XP_LEVELS[lv]||0;var nxt=XP_LEVELS[lv+1]||cur+2000;return Math.round((xp-cur)/(nxt-cur)*100);}
function buildXPBar(){
  var xp=getXP(),lv=getXPLevel(xp),pct=getXPProgress(xp);
  var lv1=XP_LEVELS[lv]||XP_LEVELS[lv-1]+2000;
  return '<div class="xp-wrap"><div class="xp-top"><div class="xp-title">Niveau '+lv+' · '+xp+' XP total</div><div class="xp-val">'+pct+'%</div></div><div class="xp-bg"><div class="xp-fill" id="xpf" style="width:0%"></div></div><div class="xp-next"><span>Niveau '+lv+'</span><span>Niveau '+(lv+1)+' à '+lv1+' XP</span></div></div>';
}
function updateXPBar(){var el=$id('xpf');if(el)el.style.width=getXPProgress(getXP())+'%';}

/* ── STREAK SYSTEM ── */
function checkAndUpdateStreak(){
  var lastDay=LS.g('last_day')||0;
  var yesterday=TODAY-1;
  if(lastDay===yesterday){U.streak=(U.streak||0)+1;}
  else if(lastDay!==TODAY){if(lastDay<yesterday)U.streak=1;}
  U.streak=U.streak||1;
  LS.s('last_day',TODAY);
  LS.s('profile',U);
}
function checkDailyComplete(){
  var keys=['grammar','vocab','reading','conversation'];
  var all=keys.every(function(k){return dailyDone[k];});
  if(all&&!LS.g('streak_done_'+TODAY)){
    LS.s('streak_done_'+TODAY,true);
    var el=$id('toast');
    el.textContent='🔥 Série de '+U.streak+' jour'+(U.streak>1?'s':'')+' ! Programme du jour complété !';
    el.classList.add('on');setTimeout(function(){el.classList.remove('on');},3500);
  }
}

/* ── OVERRIDE markDone ── */
var _origMD=markDone;
markDone=function(key){
  _origMD(key);
  addXP(key);

  var sv=$id('s-str');if(sv)sv.textContent=(U.streak||1)+'j';
};

/* ── INJECT XP + MOT DU JOUR INTO HOME ── */
var _origBuildAS=buildAppShell;
buildAppShell=function(){
  _origBuildAS();

    var home=$id('app-home');if(!home)return;

var EXAM_POOL=[

genExamQs=function(){
  var pool=EXAM_POOL.slice();
  for(var i=pool.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=pool[i];pool[i]=pool[j];pool[j]=t;}
  var gram=[],voc=[],read=[],adv=[];
  pool.forEach(function(q){
    if(q.sec==='Grammaire'&&gram.length<4)gram.push(q);
    else if(q.sec==='Vocabulaire'&&voc.length<3)voc.push(q);
    else if(q.sec==='Compréhension'&&read.length<2)read.push(q);
    else if((q.sec==='Grammaire avancée'||q.sec==='Vocabulaire avancé')&&adv.length<2)adv.push(q);
  });
  var writing={sec:'Expression écrite',type:'writing',q:'Write a professional email (60-90 words) to your team announcing a 1-week delay in the project launch. Include the reason, the new date, and a positive closing.',ph:'Subject: Project Launch Update\n\nDear Team,\n\nI am writing to inform you...',minWords:45};
  return gram.concat(voc).concat(read).concat(adv).concat([writing]);
};

var _origFE=finishExam;
finishExam=function(){
  _origFE();
  setTimeout(function(){
    var last=LS.g('last_exam');
    if(last){var hist=LS.g('exam_history')||[];hist.push(last);if(hist.length>20)hist=hist.slice(-20);LS.s('exam_history',hist);}
    addXP('exam');setTimeout(updateXPBar,400);
  },600);
};
